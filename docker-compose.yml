services:
  db:
    image: postgres:18.3-alpine
    container_name: moneykeeper-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-moneykeeper}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Automatically initialize the schema on first run
      - ./backend/internal/datamodel/schema.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
