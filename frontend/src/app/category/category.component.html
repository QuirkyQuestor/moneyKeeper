<h2>Account Types</h2>

<div>
  <label for="new-category-name">Category name: </label>
  <input id="new-category-name" #categoryName />
  <label for="new-category-description">Category description: </label>
  <input id="new-category-description" #categoryDescription />
</div>

<button
  mat-raised-button
  color="primary"
  type="button"
  class="add-button"
  (click)="
    addCategory(categoryName.value, categoryDescription.value);
    categoryName.value = '';
    categoryDescription.value = ''
  "
>
  Add AccountType
</button>

<mat-divider></mat-divider>

<table mat-table [dataSource]="categories" class="mat-elevation-z8">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let category">{{ category.name }}</td>
  </ng-container>

  <ng-container matColumnDef="parent">
    <th mat-header-cell *matHeaderCellDef>Parent</th>
    <td mat-cell *matCellDef="let category">{{ category.parentId }}</td>
  </ng-container>

  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef>Description</th>
    <td mat-cell *matCellDef="let category">{{ category.description }}</td>
  </ng-container>

  <ng-container matColumnDef="expence">
    <th mat-header-cell *matHeaderCellDef>Expence</th>
    <td mat-cell *matCellDef="let category">{{ category.expence }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let category">
      <button
        mat-raised-button
        color="primary"
        title="Edit Category {{ category.name }}"
        routerLink="/category/{{ category.categoryId }}"
      >
        Edit
      </button>

      <button
        mat-raised-button
        color="warn"
        title="Delete Category {{ category.name }}"
        (click)="deleteCategory(category)"
      >
        Delete
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
