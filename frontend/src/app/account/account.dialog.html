<div class="modal-header">
  <h4 class="modal-title">Edit Account</h4>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body">
  <div class="mb-3">
    <label for="nameField" class="form-floating mb-3">Account Name</label>
    <input
      type="text"
      class="form-control"
      id="nameField"
      placeholder="Account type Name"
      [(ngModel)]="account.name"
    />
  </div>
  <div>
    <label for="accountTypeSelect" class="form-floating mb-3"
      >Account Type</label
    >
    <select
      class="form-select"
      id="accountTypeSelect"
      aria-label="Default select example"
      [(ngModel)]="account.typeId"
    >
      <option
        *ngFor="let accountType of accountTypes"
        [value]="accountType.typeId"
      >
        {{ accountType.name }}
      </option>
    </select>
  </div>

  <div class="mb-3">
    <label for="descriptionField" class="form-floating mb-3">Description</label>
    <input
      type="text"
      class="form-control"
      id="descriptionField"
      [(ngModel)]="account.description"
    />
  </div>
  <div class="mb-3">
    <label for="descriptionField" class="form-floating mb-3">Active</label>
    <input
      type="text"
      class="form-control"
      id="descriptionField"
      [(ngModel)]="account.active"
    />
  </div>
</div>
<div class="modal-footer">
  <button
    type="button"
    class="btn btn-primary"
    (click)="activeModal.close(account)"
  >
    Save
  </button>
  <button
    type="button"
    class="btn btn-info"
    (click)="activeModal.dismiss('Cancel')"
  >
    Cancel
  </button>
</div>
