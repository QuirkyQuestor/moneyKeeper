<h1 mat-dialog-title>Add Account</h1>
<div mat-dialog-content>
  <mat-form-field appearance="fill">
    <mat-label>Name:</mat-label>
    <input matInput [(ngModel)]="data.account.name" />
  </mat-form-field>
  <!-- <mat-form-field appearance="fill">
    <mat-label>Account Type:</mat-label>
    <input matInput [(ngModel)]="data.account.typeId" />
  </mat-form-field> -->
  <mat-form-field>
    <mat-label>Account Type</mat-label>
    <mat-select [(value)]="data.account.typeId">
      <mat-option
        *ngFor="let accountType of data.accountTypes"
        [value]="accountType.typeId"
      >
        {{ accountType.name }} {{data.account.typeId}}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Description:</mat-label>
    <input matInput [(ngModel)]="data.account.description" />
  </mat-form-field>
  <mat-checkbox [(ngModel)]="data.account.active">Active</mat-checkbox>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="onNoClick()">No Thanks</button>
  <button mat-button [mat-dialog-close]="data" cdkFocusInitial>OK</button>
</div>
