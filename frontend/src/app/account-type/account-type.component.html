<h2>Account Types</h2>

<button
  mat-raised-button
  color="primary"
  type="button"
  class="add-button"
  (click)="openAddAccountTypeDialog()"
>
  Add AccountType
</button>

<mat-divider></mat-divider>

<table mat-table [dataSource]="accountTypes" class="mat-elevation-z8">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let type">{{ type.name }}</td>
  </ng-container>

  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef>Description</th>
    <td mat-cell *matCellDef="let type">{{ type.description }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let type">
      <button
        mat-raised-button
        color="primary"
        title="Edit AccountType"
        (click)="openEditAccountTypeDialog(type)"
      >
        Edit
      </button>

      <button
        mat-raised-button
        color="warn"
        title="Delete AccountType"
        (click)="openDeleteAccountTypeDialog(type)"
      >
        Delete
      </button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
