<div class="modal-header">
  <h4 class="modal-title">Edit AccountType</h4>
  <button
    type="button"
    class="btn-close"
    aria-label="Close"
    (click)="activeModal.dismiss('Cross click')"
  ></button>
</div>
<div class="modal-body">
  <div class="mb-3">
    <label for="nameField" class="form-floating mb-3">Type Name</label>
    <input
      type="text"
      class="form-control"
      id="nameField"
      placeholder="Account type Name"
      [(ngModel)]="accountType.name"
    />
  </div>
  <div class="mb-3">
    <label for="descriptionField" class="form-floating mb-3">Description</label>
    <input
      type="text"
      class="form-control"
      id="descriptionField"
      [(ngModel)]="accountType.description"
    />
  </div>
</div>
<div class="modal-footer">
  <button
    type="button"
    class="btn btn-primary"
    (click)="activeModal.close(accountType)"
  >
    Save
  </button>
  <button
    type="button"
    class="btn btn-info"
    (click)="activeModal.dismiss('Cancel')"
  >
    Cancel
  </button>
</div>
